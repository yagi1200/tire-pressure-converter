<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>空気圧 単位換算ツール</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --card2: #273449;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --accent2: #22c55e;
    --border: #334155;
    --highlight: #fbbf24;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Kaku Gothic ProN", "Yu Gothic", Meiryo, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    padding: 16px;
  }
  .wrap { max-width: 560px; margin: 0 auto; }
  h1 {
    font-size: 1.35rem;
    margin: 8px 0 4px;
    text-align: center;
  }
  .sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 20px;
  }
  .input-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }
  input[type="number"] {
    flex: 1;
    min-width: 0;
    font-size: 1.6rem;
    font-weight: 700;
    padding: 12px 14px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--card2);
    color: var(--text);
    text-align: right;
  }
  input[type="number"]:focus {
    outline: none;
    border-color: var(--accent);
  }
  select {
    font-size: 1rem;
    padding: 10px 12px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--card2);
    color: var(--text);
    min-width: 130px;
  }
  select:focus { outline: none; border-color: var(--accent); }

  .results {
    display: grid;
    gap: 12px;
  }
  .res-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    transition: opacity .15s;
  }
  .res-card.is-source {
    border-color: var(--accent);
    background: var(--card2);
  }
  .res-card.dimmed { opacity: .45; }
  .unit-label {
    display: flex;
    flex-direction: column;
  }
  .unit-name {
    font-size: 1.05rem;
    font-weight: 700;
  }
  .unit-desc {
    font-size: 0.72rem;
    color: var(--muted);
  }
  .unit-use {
    font-size: 0.7rem;
    color: var(--accent2);
    margin-top: 2px;
  }
  .res-value {
    font-size: 1.7rem;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    color: var(--highlight);
    text-align: right;
  }
  .res-card.is-source .res-value { color: var(--accent); }

  .presets {
    margin-top: 24px;
  }
  .presets h2 {
    font-size: 0.95rem;
    color: var(--muted);
    margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  .preset-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .preset-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    color: var(--text);
    text-align: left;
    cursor: pointer;
    font-size: 0.8rem;
  }
  .preset-btn:hover { border-color: var(--accent); }
  .preset-btn b { color: var(--accent); font-size: 0.95rem; }
  .preset-btn span { color: var(--muted); display: block; font-size: 0.72rem; }

  footer {
    margin-top: 28px;
    text-align: center;
    color: var(--muted);
    font-size: 0.72rem;
  }
  .note {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 18px;
  }
  .note code { color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <h1>空気圧 単位換算ツール</h1>
  <p class="sub">kPa ／ bar ／ psi ／ kgf/cm² を相互換算</p>

  <div class="input-card">
    <div class="input-row">
      <input type="number" id="value" inputmode="decimal" step="0.01" value="2.0" aria-label="数値">
      <select id="unit" aria-label="単位">
        <option value="kgfcm2">kgf/cm²</option>
        <option value="kpa">kPa</option>
        <option value="bar">bar</option>
        <option value="psi">psi</option>
      </select>
    </div>
  </div>

  <div class="results" id="results"></div>

  <div class="presets">
    <h2>クイックプリセット</h2>
    <div class="preset-grid" id="presets"></div>
  </div>

  <div class="note">
    <b>換算基準（1単位 = ? kPa）</b><br>
    1 bar = 100 kPa ／ 1 kgf/cm² = 98.0665 kPa ／ 1 psi ≈ 6.89476 kPa<br>
    ※ 気圧ゲージの読みはゲージ圧（大気圧を0とした値）です。
  </div>

  <footer>空気圧換算 — オフロード / MTB 用</footer>
</div>

<script>
  // 各単位の「1単位あたりの kPa 値」
  const TO_KPA = {
    kpa:    1,
    bar:    100,
    psi:    6.894757293168361,
    kgfcm2: 98.0665,
  };

  const UNITS = [
    { key: "kgfcm2", name: "kgf/cm²", desc: "キログラムフォース毎平方センチ", use: "オフロードバイク・空気入れ表記", decimals: 2 },
    { key: "kpa",    name: "kPa",     desc: "キロパスカル",                   use: "エアゲージ表記",                 decimals: 0 },
    { key: "bar",    name: "bar",     desc: "バール",                         use: "MTB（自転車）",                 decimals: 2 },
    { key: "psi",    name: "psi",     desc: "プサイ（重量ポンド毎平方インチ）", use: "MTB（自転車）",                 decimals: 1 },
  ];

  const PRESETS = [
    { label: "オフロード 前", sub: "0.8 kgf/cm²", value: 0.8, unit: "kgfcm2" },
    { label: "オフロード 後", sub: "0.9 kgf/cm²", value: 0.9, unit: "kgfcm2" },
    { label: "MTB トレイル",  sub: "1.6 bar",     value: 1.6, unit: "bar" },
    { label: "MTB 舗装寄り",  sub: "2.2 bar",     value: 2.2, unit: "bar" },
    { label: "ロード目安",    sub: "90 psi",      value: 90,  unit: "psi" },
    { label: "低圧グリップ",  sub: "150 kPa",     value: 150, unit: "kpa" },
  ];

  const valueEl = document.getElementById("value");
  const unitEl  = document.getElementById("unit");
  const resultsEl = document.getElementById("results");
  const presetsEl = document.getElementById("presets");

  function fmt(n, decimals) {
    if (!isFinite(n)) return "–";
    return n.toLocaleString("ja-JP", {
      minimumFractionDigits: decimals,
      maximumFractionDigits: decimals,
    });
  }

  function render() {
    const raw = parseFloat(valueEl.value);
    const srcUnit = unitEl.value;
    const kpa = isNaN(raw) ? NaN : raw * TO_KPA[srcUnit];

    resultsEl.innerHTML = UNITS.map(u => {
      const val = kpa / TO_KPA[u.key];
      const isSrc = u.key === srcUnit;
      const dim = isNaN(kpa) ? " dimmed" : "";
      return `
        <div class="res-card${isSrc ? " is-source" : ""}${dim}">
          <div class="unit-label">
            <span class="unit-name">${u.name}${isSrc ? " ●" : ""}</span>
            <span class="unit-desc">${u.desc}</span>
            <span class="unit-use">${u.use}</span>
          </div>
          <div class="res-value">${fmt(val, u.decimals)}</div>
        </div>`;
    }).join("");
  }

  function renderPresets() {
    presetsEl.innerHTML = PRESETS.map((p, i) => `
      <button class="preset-btn" data-i="${i}">
        <b>${p.label}</b>
        <span>${p.sub}</span>
      </button>`).join("");
    presetsEl.querySelectorAll(".preset-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const p = PRESETS[btn.dataset.i];
        valueEl.value = p.value;
        unitEl.value = p.unit;
        render();
      });
    });
  }

  valueEl.addEventListener("input", render);
  unitEl.addEventListener("change", render);
  renderPresets();
  render();
</script>
</body>
</html>
